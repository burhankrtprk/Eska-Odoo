name: CI — Lint & Odoo Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
  workflow_dispatch:
    inputs:
      target_module:
        description: 'test edilecek modüller'
        required: false
        type: string

env:
  # Ortam değişkeniyle sabit bir modül verebilirsiniz.
  # Eğer bu boşsa, Git değişikliklerinden otomatik tespit edilir.
  TARGET_MODULE: "aras_delivery_integration"

  # Modül arama yolları (virgülle ayrılmış).
  # Yeni bir addons dizini eklemek için buraya eklemeniz yeterli.
  ADDONS_PATHS: "custom_addons,odoo/addons"

jobs:
  # ─────────────────────────────────────────
  # 0. Setup: Hangi modül test edilecek?
  # ─────────────────────────────────────────
  setup:
    name: Determine Target Module
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.set-module.outputs.module }}
      module_path: ${{ steps.set-module.outputs.module_path }}
      odoo_version: ${{ steps.set-module.outputs.odoo_version }}
      python_version: ${{ steps.set-module.outputs.python_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: set-module
        run: |
          MOD="${{ github.event.inputs.target_module }}"
          if [ -z "$MOD" ] && [ -n "${{ env.TARGET_MODULE }}" ]; then
            MOD="${{ env.TARGET_MODULE }}"
          fi

          # ADDONS_PATHS env'den arama yollarını oku
          IFS=',' read -ra SEARCH_PATHS <<< "${{ env.ADDONS_PATHS }}"

          if [ -z "$MOD" ]; then
            # Git diff'ten modül adını otomatik tespit et (tüm arama yollarında)
            DIFF_FILES=$( (git diff --name-only 2>/dev/null; git diff --name-only HEAD~1 HEAD 2>/dev/null) || true)
            for SPATH in "${SEARCH_PATHS[@]}"; do
              MOD=$(echo "$DIFF_FILES" | grep "^${SPATH}/" | sed "s|^${SPATH}/||" | cut -d '/' -f 1 | sort -u | head -n 1 || true)
              [ -n "$MOD" ] && break
            done
          fi

          if [ -z "$MOD" ]; then
            echo "❌ Hedef modül tespit edilemedi!"
            exit 1
          fi

          # Modül yolunu belirle: ADDONS_PATHS içinde sırayla ara
          MOD_PATH=""
          for SPATH in "${SEARCH_PATHS[@]}"; do
            if [ -d "${SPATH}/$MOD" ]; then
              MOD_PATH="${SPATH}/$MOD"
              break
            fi
          done

          if [ -z "$MOD_PATH" ]; then
            echo "❌ '$MOD' modülü hiçbir arama yolunda bulunamadı: ${{ env.ADDONS_PATHS }}"
            exit 1
          fi

          echo "📂 Modül yolu: $MOD_PATH"

          # Manifest'ten versiyonu çek
          MANIFEST="$MOD_PATH/__manifest__.py"
          VERSION_LINE=$(grep -E "['\"]version['\"]" "$MANIFEST" | head -n 1)
          RAW_VERSION=$(echo "$VERSION_LINE" | grep -oE "[0-9]+\.[0-9]+" | head -n 1)

          # Odoo 18 Güncellemesi: Varsayılan versiyon 18.0'a çekildi
          if [ -z "$RAW_VERSION" ]; then
            RAW_VERSION="18.0"
          fi

          # Python versiyon haritalama (Ubuntu 24.04 runner: min 3.10)
          # < 18.0 -> 3.10
          # >= 18.0 -> 3.12 (Odoo 18 için önerilen)
          MAJOR_VERSION=$(echo "$RAW_VERSION" | cut -d. -f1)
          if [ "$MAJOR_VERSION" -lt 18 ]; then
            PY_VERSION="3.10"
          else
            PY_VERSION="3.12"
          fi

          echo "🎯 Test Hedefi: $MOD @ $MOD_PATH (Odoo $RAW_VERSION, Python $PY_VERSION)"
          echo "module=$MOD" >> $GITHUB_OUTPUT
          echo "module_path=$MOD_PATH" >> $GITHUB_OUTPUT
          echo "odoo_version=$RAW_VERSION" >> $GITHUB_OUTPUT
          echo "python_version=$PY_VERSION" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # 1. Commit Message Lint
  # ─────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Commitlint
        run: npm install @commitlint/cli @commitlint/config-conventional
      - name: Configure Commitlint
        run: |
          echo "module.exports = {extends: ['@commitlint/config-conventional']}" > commitlint.config.js
      - name: Run Commitlint
        run: npx commitlint --from=HEAD~1 --to=HEAD || true

  # ─────────────────────────────────────────
  # 2. Python Lint (ruff + pylint-odoo)
  # ─────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    needs: [setup, commitlint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python_version }}
      - name: Install linters
        run: pip install ruff pylint pylint-odoo
      - name: Linter Check for ${{ needs.setup.outputs.module }}
        run: |
          MOD="${{ needs.setup.outputs.module }}"
          MOD_PATH="${{ needs.setup.outputs.module_path }}"
          echo "Linting $MOD_PATH/"
          ruff check "$MOD_PATH/"
          pylint \
            --load-plugins=pylint_odoo \
            --disable=all \
            --enable=odoolint \
            --disable=C8101 \
            "$MOD_PATH/"

  # ─────────────────────────────────────────
  # 3. Manifest Sanity Check
  # ─────────────────────────────────────────
  manifest-check:
    name: Manifest Check
    runs-on: ubuntu-latest
    needs: [setup, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python_version }}
      - name: Validate __manifest__.py
        run: |
          MOD="${{ needs.setup.outputs.module }}"
          MOD_PATH="${{ needs.setup.outputs.module_path }}"
          MANIFEST_PATH="$MOD_PATH/__manifest__.py"

          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "❌ $MANIFEST_PATH bulunamadı!"
            exit 1
          fi

          python3 -c "
          import ast, sys
          required_keys = ['name', 'version', 'depends']
          try:
              with open('$MANIFEST_PATH') as f:
                  data = ast.literal_eval(f.read())
              for key in required_keys:
                  if key not in data:
                      print(f'❌ Manifest eksik alan: {key}')
                      sys.exit(1)
              print('✅ Manifest geçerli.')
          except Exception as e:
              print(f'❌ Parse hatası: {e}')
              sys.exit(1)
          "

  # ─────────────────────────────────────────
  # 4. Odoo Unit & Integration Tests & Version Check
  # ─────────────────────────────────────────
  odoo-tests:
    name: Odoo Module Tests
    runs-on: ubuntu-latest
    needs: [setup, lint, manifest-check]

    services:
      postgres:
        image: postgres:16 # Odoo 18 için Postgres 16'ya yükseltildi
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 65432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.setup.outputs.python_version }}

      - name: Dynamic Odoo Checkout
        run: |
          MOD_VERSION="${{ needs.setup.outputs.odoo_version }}"
          echo "🌐 Modül, Odoo $MOD_VERSION talep ediyor. Odoo Core Github'dan (shallow) indiriliyor..."
          git clone --depth 1 --branch $MOD_VERSION https://github.com/odoo/odoo.git odoo_core

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libpq-dev libxml2-dev libxslt1-dev libldap2-dev \
            libsasl2-dev libjpeg-dev libpng-dev libffi-dev libssl-dev nodejs npm

          # Derleme hızı ve hatalarını önlemek için temel araçları güncelle
          python3 -m pip install --upgrade pip "setuptools<70" wheel

          # Odoo'nun eski gevent (21.8.0) gereksinimi Python 3.10+ üzerinde derlenemiyor.
          # Sürüm sınırlandırmalarını esneterek pre-compiled wheel paketi kurulmasını sağlıyoruz.
          sed -i -E 's/gevent==[0-9\.]+/gevent>=21.8.0/g' odoo_core/requirements.txt || true
          sed -i -E 's/greenlet==[0-9\.]+/greenlet>=1.1.2/g' odoo_core/requirements.txt || true

          # Dinamik indirilen Odoo çekirdeğinin kalan pip gereksinimlerini kur
          pip install -r odoo_core/requirements.txt
          pip install "setuptools<70" # pkg_resources için gerekli

      - name: Prepare Isolated Test Environment
        run: |
          MOD="${{ needs.setup.outputs.module }}"
          MOD_PATH="${{ needs.setup.outputs.module_path }}"
          mkdir -p testing_addons
          # Sadece hedeflenen modülü test addons klasörüne linkle
          ln -s "$PWD/$MOD_PATH" "testing_addons/$MOD"
          echo "Test ortamına '$MOD' ($MOD_PATH) izole edildi."

      - name: Run Odoo Tests
        run: |
          MOD="${{ needs.setup.outputs.module }}"
          MOD_PATH="${{ needs.setup.outputs.module_path }}"
          if [ ! -d "$MOD_PATH/tests" ]; then
            echo "⚠️ '$MOD' modülünde tests/ klasörü bulunamadı, test komutu çalıştırılmayacak. Sadece yükleme simüle edildi."
            exit 0
          fi

          python odoo_core/odoo-bin \
            --test-enable \
            --test-tags=/$MOD \
            --stop-after-init \
            --no-http \
            -d odoo_test \
            --db_host=localhost \
            --db_port=65432 \
            --db_user=odoo \
            --db_password=odoo \
            --addons-path=odoo_core/addons,testing_addons \
            -i $MOD
